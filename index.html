<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="icon-192.png">
  <meta name="theme-color" content="#1e1f24">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Monitor de Medicamentos - Família</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">

  <style>
    /* ── Tela de Login ── */
    #tela-login {
      position: fixed;
      inset: 0;
      background: #1e1f24;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #tela-login.oculto {
      display: none;
    }

    .login-card {
      background: #2a2b31;
      border-radius: 16px;
      padding: 2rem;
      width: 90%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .login-card h2 {
      color: #fff;
      text-align: center;
      margin: 0;
      font-size: 1.3rem;
    }

    .login-card p.subtitulo {
      color: #aaa;
      text-align: center;
      font-size: 0.85rem;
      margin: -0.5rem 0 0;
    }

    .login-card input {
      background: #1e1f24;
      border: 1px solid #444;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .login-card input:focus {
      border-color: #7c6af7;
    }

    .login-card button {
      background: #7c6af7;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.85rem;
      transition: background 0.2s;
    }

    .login-card button:hover {
      background: #6a59e0;
    }

    .login-card button:disabled {
      background: #555;
      cursor: not-allowed;
    }

    #login-erro {
      color: #f87171;
      font-size: 0.85rem;
      text-align: center;
      min-height: 1.2em;
    }
  </style>
</head>
<body>

  <!-- ── Tela de Login (some após autenticar) ── -->
  <div id="tela-login">
    <div class="login-card">
      <h2>💊 Monitor de Medicamentos</h2>
      <p class="subtitulo">Faça login para continuar</p>

      <input type="text"     id="login-usuario" placeholder="Usuário"  autocomplete="username">
      <input type="password" id="login-senha"    placeholder="Senha"    autocomplete="current-password">

      <p id="login-erro"></p>

      <button id="btn-login">Entrar</button>
    </div>
  </div>

  <!-- ── Tela Principal (só aparece após login) ── -->
  <div class="container" id="tela-principal" style="display:none">
    <header>
      <h1>Painel de Monitoramento</h1>
      <div id="relogio-digital">00:00:00</div>
    </header>

    <div id="compartimentos"></div>

    <div class="footer-actions">
      <button class="btn-historico" onclick="window.abrirHistorico()">📋 Histórico de Atividades</button>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="script/notifications.js"></script>
  <script type="module" src="script/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(reg => console.log('SW registrado!', reg))
          .catch(err => console.error('Erro ao registrar SW:', err));
      });
    }
  </script>
</body>
</html>
